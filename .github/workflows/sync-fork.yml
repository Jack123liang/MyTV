name: Sync Fork with Upstream

on:
  schedule:
    - cron: "10 */6 * * *"   # 每6小时运行（在第10分钟），与生成任务错开
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync from upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 添加 upstream
          git remote add upstream https://github.com/xiaotan8/xiaotan8.github.io.git || true
          
          git fetch upstream
          
          # 尝试合并 upstream 的最新代码
          if git merge upstream/main --allow-unrelated-histories; then
            echo "Successfully merged upstream changes"
          else
            echo "Merge conflict detected, aborting merge"
            git merge --abort
            exit 1
          fi
          
          # 安全推送
          git push origin main --force-with-lease
